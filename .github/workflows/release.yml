name: Release to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # PyPI trusted publishing (OIDC) — no API tokens needed.
    #
    # Before the FIRST release, a matching (pending) trusted publisher must
    # exist on PyPI, otherwise the upload fails with
    # "400 Non-user identities cannot create new projects".
    # Register it at https://pypi.org/manage/account/publishing/ with:
    #   PyPI Project Name: taphome-sdk
    #   Owner:             martindybal
    #   Repository name:   taphome-sdk
    #   Workflow name:     release.yml
    #   Environment name:  pypi
    # These must match the `environment` name below and the project `name`
    # in pyproject.toml. Manage it afterwards at
    # https://pypi.org/manage/project/taphome-sdk/settings/publishing/
    environment:
      name: pypi
      url: https://pypi.org/p/taphome-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
